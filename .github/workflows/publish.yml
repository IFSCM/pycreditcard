name: Publish to PyPI

on:
  push:
    tags:
      - "v*"   # triggers on v1.1.0, v1.2.0, etc.

jobs:
  test:
    uses: ./.github/workflows/ci.yml   # run CI first

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pycreditcard

    permissions:
      id-token: write   # required for OIDC trusted publishing (no API token needed)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No token needed — uses OIDC trusted publishing